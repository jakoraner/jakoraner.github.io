<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W07P4</title>
    <!-- Include Angel's WebGL utility scripts -->
    <script src="../angelCommon/webgl-utils.js"></script>
    <script src="../angelCommon/initShaders.js"></script>
    <script src="../angelCommon/MV.js"></script>

    <script id="vertex-shader" type="x-shader/x-vertex">
        precision mediump float;  
        precision mediump int;    
    
        attribute vec4 vPosition;
        attribute vec3 vNormal;
        varying vec3 texCoord;       // Pass directions to fragment shader
        varying vec3 vNormalWorld;   // Normal in world space for reflective sphere
        varying vec4 vPositionWorld; // Position in world space for reflective sphere

        uniform mat4 modelViewMatrix;
        uniform mat4 projectionMatrix;
        uniform mat4 modelMatrix;
        uniform mat4 Mtex;
        uniform int reflective;
        
        void main() {
            if (reflective == 0) {
                // Background quad
                gl_Position = vPosition; 
                vec4 pos = Mtex * vPosition;
                texCoord = pos.xyz;

                // Not needed for the background
                vNormalWorld = vec3(0.0, 0.0, 0.0);
                vPositionWorld = vec4(0.0, 0.0, 0.0, 1.0);
            } else {
                // Reflective sphere
                gl_Position = projectionMatrix * modelViewMatrix * vPosition;
                vNormalWorld = normalize(mat3(modelMatrix) * vNormal);
                vPositionWorld = modelMatrix * vPosition;
                texCoord = vNormalWorld; // Used to get (u,v) later in fragment shader
            }
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        precision mediump int;    

        varying vec3 vNormalWorld;
        varying vec4 vPositionWorld;
        varying vec3 texCoord;

        uniform samplerCube texMap;
        uniform sampler2D normalMap; // Normal map texture
        uniform vec3 eyePosition;
        uniform mat4 modelMatrix;
        uniform int reflective;

        // rotate_to_normal function as provided
        vec3 rotate_to_normal(vec3 n, vec3 v) {
            float sgn_nz = sign(n.z + 1.0e-16);
            float a = -1.0/(1.0 + abs(n.z));
            float b = n.x*n.y*a;
            return vec3(1.0 + n.x*n.x*a, b, -sgn_nz*n.x)*v.x
                 + vec3(sgn_nz*b, sgn_nz*(1.0 + n.y*n.y*a), -n.y)*v.y
                 + n*v.z;
        }

        void main() {
            if (reflective == 0) {
                // Background: sample the environment map directly
                gl_FragColor = textureCube(texMap, normalize(texCoord));
            } else {
                // Reflective sphere with bump mapping
                vec3 N = normalize(vNormalWorld);

                float pi = 3.1415926535897932384626433832795;
                float u = 1.0 - (atan(N.z, N.x) / (2.0 * pi));
                float v = acos(N.y) / pi;

                vec3 normalColor = texture2D(normalMap, vec2(u,v)).rgb;
                vec3 N_tangent = 2.0 * normalColor - 1.0;
                vec3 Nbump = rotate_to_normal(N, N_tangent);
                Nbump = normalize(Nbump);

                vec3 P = normalize(vPositionWorld.xyz);
                vec3 vDir = normalize(eyePosition - P);

                vec3 direction = reflect(-vDir, Nbump);
                gl_FragColor = textureCube(texMap, direction);
            }
        }
    </script>

    <script type="text/javascript" src="w07p4.js"></script>
</head>
<body>
    <canvas id="gl" width="512" height="512">
        Your browser doesn't support the HTML5 <code>&lt;canvas&gt;</code> element.
    </canvas>
    <div>
        <button id="toggle-orbit">Stop Orbiting</button>
    </div>
</body>
</html>
