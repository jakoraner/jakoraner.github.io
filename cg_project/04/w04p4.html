<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W04P4 - Phong Shaded Red Sphere with Controls</title>
    <!-- Include Angel's WebGL utility scripts -->
    <script src="../angelCommon/webgl-utils.js"></script>
    <script src="../angelCommon/initShaders.js"></script>
    <script src="../angelCommon/MV.js"></script>

    <!-- Vertex Shader -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 aPosition;
        varying vec4 vColor;

        uniform mat4 uModelViewMatrix;
        uniform mat4 uProjectionMatrix;
        uniform mat3 uNormalMatrix;

        uniform float uLeAmbient;         // Ambient radiance (formerly ka)
        uniform float uKd;                // Diffuse reflection coefficient
        uniform float uKs;                // Specular reflection coefficient
        uniform float uShininess;         // Shininess exponent
        uniform vec3 uLe;                 // Light emission
        uniform vec3 uLightDir;           // Light direction in eye space

        void main() {
            // Transform the vertex position to eye space
            vec4 eyePosition = uModelViewMatrix * aPosition;
            gl_Position = uProjectionMatrix * eyePosition;

            // Compute the normal in model space
            vec3 normalModel = normalize(aPosition.xyz);

            // Transform the normal to eye space
            vec3 normal = normalize(uNormalMatrix * normalModel);

            // Normalize the light direction
            vec3 lightDirection = normalize(uLightDir);

            // Compute the view direction (from eye position to origin)
            vec3 viewDir = normalize(-eyePosition.xyz);

            // Compute the halfway vector
            vec3 halfwayDir = normalize(lightDirection + viewDir);

            // Ambient component
            vec3 ambient = uLeAmbient * uLe;

            // Diffuse component
            float diff = max(dot(normal, lightDirection), 0.0);
            vec3 diffuse = uKd * uLe * diff;

            // Specular component
            float spec = 0.0;
            if (diff > 0.0) {
                spec = pow(max(dot(normal, halfwayDir), 0.0), uShininess);
            }
            vec3 specular = uKs * uLe * spec;

            // Sum all components
            vec3 color = ambient + diffuse + specular;

            // Since the sphere is red, multiply the color by red
            color = color * vec3(1.0, 0.0, 0.0);

            // Set the varying color for Gouraud shading
            vColor = vec4(color, 1.0);
        }
    </script>

    <!-- Fragment Shader -->
    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec4 vColor;
        void main() {
            gl_FragColor = vColor;
        }
    </script>

    <!-- Include the JavaScript file -->
    <script src="w04p4.js"></script>
</head>
<body> 
    <canvas id="gl" width="600" height="600"></canvas>

    <!-- Controls -->
    <div style="margin-top: 10px;">
        <!-- Subdivision Controls -->
        <button id="increase-subdivision">Increase Subdivision</button>
        <button id="decrease-subdivision">Decrease Subdivision</button>
        <br/><br/>
        <!-- Orbiting Control -->
        <button id="toggle-orbit">Start Orbiting</button>
        <br/><br/>
        <!-- Depth Testing and Culling Toggles -->
        <button id="toggle-depth-testing">Disable Depth Testing</button> <!-- Enabled by default -->
        <button id="toggle-culling">Enable Back-Face Culling</button>    <!-- Disabled by default -->
        <br/><br/>
        <!-- Phong Model Sliders -->
        <div>
            <label for="leAmbient-slider">Ambient Radiance (L<sub>e</sub>): <span id="leAmbient-value">0.1</span></label>
            <input type="range" id="leAmbient-slider" min="0.0" max="1.0" step="0.01" value="0.1">
        </div>
        <div>
            <label for="kd-slider">Diffuse Coefficient (k<sub>d</sub>): <span id="kd-value">0.7</span></label>
            <input type="range" id="kd-slider" min="0.0" max="1.0" step="0.01" value="0.7">
        </div>
        <div>
            <label for="ks-slider">Specular Coefficient (k<sub>s</sub>): <span id="ks-value">0.5</span></label>
            <input type="range" id="ks-slider" min="0.0" max="1.0" step="0.01" value="0.5">
        </div>
        <div>
            <label for="shininess-slider">Shininess (s): <span id="shininess-value">32</span></label>
            <input type="range" id="shininess-slider" min="1" max="100" step="1" value="32">
        </div>
        <div>
            <label for="le-slider">Light Emission (Le): <span id="le-value">1.0</span></label>
            <input type="range" id="le-slider" min="0.0" max="2.0" step="0.01" value="1.0">
        </div>
    </div>
</body>
</html>
