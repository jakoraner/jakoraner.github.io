<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W04P3 - Gouraud Shaded Sphere with Lighting</title>
    <!-- Include Angel's WebGL utility scripts -->
    <script src="../angelCommon/webgl-utils.js"></script>
    <script src="../angelCommon/initShaders.js"></script>
    <script src="../angelCommon/MV.js"></script>

    <!-- Vertex Shader -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 aPosition;
        varying vec4 vColor;
        uniform mat4 uModelViewMatrix;
        uniform mat4 uProjectionMatrix;
        uniform vec3 uKd;        // Diffuse reflection coefficient
        uniform vec3 uLe;        // Light emission
        uniform vec3 uLightDir;  // Light direction

        void main() {
            // Transform the vertex position
            gl_Position = uProjectionMatrix * uModelViewMatrix * aPosition;

            // Compute the normal (for unit sphere, n = p.xyz)
            vec3 normal = normalize(aPosition.xyz);

            // Normalize the light direction
            vec3 lightDirection = normalize(uLightDir);

            // Compute the diffuse component
            float diffuseFactor = max(dot(normal, -lightDirection), 0.0);
            vec3 diffuse = uKd * uLe * diffuseFactor;

            // Set the varying color for Gouraud shading
            vColor = vec4(diffuse, 1.0);
        }
    </script>

    <!-- Fragment Shader -->
    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec4 vColor;
        void main() {
            gl_FragColor = vColor;
        }
    </script>

    <!-- Include the JavaScript file -->
    <script src="w04p3.js"></script>
</head>
<body> 
    <canvas id="gl" width="500" height="500"></canvas>

    <!-- Controls -->
    <div style="margin-top: 10px;">
        <button id="increase-subdivision">Increase Subdivision</button>
        <button id="decrease-subdivision">Decrease Subdivision</button>
        <button id="toggle-orbit">Start Orbiting</button>
    </div>
</body>
</html>
