<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W05P4 - Phong Shading on 3D Monkey Model</title>
    <!-- Include Angel's WebGL utility scripts -->
    <script src="../angelCommon/webgl-utils.js"></script>
    <script src="../angelCommon/initShaders.js"></script>
    <script src="../angelCommon/MV.js"></script>
    <!-- Include the OBJ parser -->
    <script src="../OBJParser.js"></script>

    <!-- Vertex Shader -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 a_Position;
        attribute vec4 a_Normal;
        attribute vec4 a_Color;

        uniform mat4 u_ModelMatrix;
        uniform mat4 u_ViewMatrix;
        uniform mat4 u_ProjectionMatrix;
        uniform mat4 u_NormalMatrix;

        varying vec3 v_Normal;
        varying vec3 v_Position;
        varying vec4 v_Color;

        void main() {
            gl_Position = u_ProjectionMatrix * u_ViewMatrix * u_ModelMatrix * a_Position;
            v_Position = vec3(u_ModelMatrix * a_Position);
            v_Normal = normalize(vec3(u_NormalMatrix * a_Normal));
            v_Color = a_Color;
        }
    </script>

    <!-- Fragment Shader -->
    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;

        varying vec3 v_Normal;
        varying vec3 v_Position;
        varying vec4 v_Color;

        uniform vec3 u_LightPosition;
        uniform vec3 u_LightColor;
        uniform vec3 u_AmbientLight;

        uniform vec3 u_SpecularColor; // Specular color of the material
        uniform float u_Shininess;    // Shininess coefficient

        void main() {
            // Normalize the normal vector
            vec3 normal = normalize(v_Normal);

            // Compute the light direction vector
            vec3 lightDirection = normalize(u_LightPosition - v_Position);

            // Compute the view direction vector (assuming the camera is at the origin)
            vec3 viewDirection = normalize(-v_Position);

            // Compute the reflection direction vector
            vec3 reflectionDirection = reflect(-lightDirection, normal);

            // Compute ambient reflection
            vec3 ambient = u_AmbientLight * v_Color.rgb;

            // Compute diffuse reflection
            float diff = max(dot(normal, lightDirection), 0.0);
            vec3 diffuse = u_LightColor * diff * v_Color.rgb;

            // Compute specular reflection
            float spec = 0.0;
            if(diff > 0.0)
                spec = pow(max(dot(reflectionDirection, viewDirection), 0.0), u_Shininess);
            vec3 specular = u_LightColor * spec * u_SpecularColor;

            // Sum all components
            vec3 finalColor = ambient + diffuse + specular;

            gl_FragColor = vec4(finalColor, v_Color.a);
        }
    </script>

    <!-- Include your custom script -->
    <script type="text/javascript" src="w05p4.js"></script>
</head>
<body>
    <canvas id="gl" width="512" height="512">
        Your browser doesn't support the HTML5 <code>&lt;canvas&gt;</code> element.
    </canvas>
</body>
</html>
