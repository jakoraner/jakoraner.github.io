<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W06P3 - Textured Earth with Camera Orbiting</title>
    <!-- Include Angel's WebGL utility scripts -->
    <script src="../angelCommon/webgl-utils.js"></script>
    <script src="../angelCommon/initShaders.js"></script>
    <script src="../angelCommon/MV.js"></script>

    <!-- Vertex Shader -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 vPosition;
        attribute vec3 vNormal;
        varying vec3 fNormal;
        varying vec3 fPosition;
        varying vec3 vNormalModel;

        uniform mat4 modelViewMatrix;
        uniform mat4 projectionMatrix;
        uniform mat3 normalMatrix;

        void main() {
            gl_Position = projectionMatrix * modelViewMatrix * vPosition;
            fNormal = normalize(normalMatrix * vNormal);
            fPosition = vec3(modelViewMatrix * vPosition);
            vNormalModel = normalize(vNormal); // Pass the model-space normal
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec3 fNormal;
        varying vec3 fPosition;
        varying vec3 vNormalModel;
        uniform sampler2D texture;
        uniform vec3 lightDirection;
        uniform vec4 ambientProduct;
        uniform vec4 diffuseProduct;
        
        void main() {
            vec3 N_model = normalize(vNormalModel);
            vec3 N = normalize(fNormal);
            vec3 L = normalize(lightDirection);
        
            float PI = 3.1415926;
            float u = (atan(N_model.z, N_model.x) + PI) / (2.0 * PI);
            float v = acos(N_model.y) / PI;
        
        
            // If the texture isn't seamless, color edges blue or blend
            float edgeThreshold = 0.00000001;
            vec4 texColor;
            if (u < edgeThreshold || u > 1.0 - edgeThreshold) {
                texColor = vec4(0.95, 153.0, 255.0, 1.0);
            } else {
                texColor = texture2D(texture, vec2(u, v));
            }
        
            // Lighting
            vec4 ambient = ambientProduct * texColor;
            vec4 diffuse = diffuseProduct * texColor * max(dot(L, N), 0.0);
        
            gl_FragColor = ambient + diffuse;
            gl_FragColor.a = 1.0;
        }
        </script>

    <!-- Include your custom script -->
    <script type="text/javascript" src="w06p3.js"></script>
</head>
<body>
    <canvas id="gl-canvas" width="512" height="512">
        Your browser doesn't support the HTML5 <code>&lt;canvas&gt;</code> element.
    </canvas>

    <!-- Controls -->
    <div>
        <button id="toggle-orbit">Stop Orbiting</button>
    </div>
</body>
</html>
