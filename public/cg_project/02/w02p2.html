<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W02P1 - Draw Points with Color Selection</title>
    <!-- Include Angel's WebGL utility scripts -->
    <script src="../angelCommon/webgl-utils.js"></script>
    <script src="../angelCommon/initShaders.js"></script>
    <script src="../angelCommon/MV.js"></script>

    <!-- Vertex Shader -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 vPosition;
        attribute vec4 vColor;
        varying vec4 fColor;

        void main() {
            gl_Position = vPosition;
            gl_PointSize = 10.0;
            fColor = vColor;
        }
    </script>

    <!-- Fragment Shader -->
    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec4 fColor;

        void main() {
            gl_FragColor = fColor;
        }
    </script>

    <!-- Include your custom script -->
    <script type="text/javascript" src="w02p2.js"></script> 
</head>
<body> 
    <canvas id="gl" width="512" height="512">
        Your browser doesn't support the HTML5 <code>&lt;canvas&gt;</code> element.
    </canvas> 

    <!-- Controls -->
    <div>
        <button id="clear-button">Clear Canvas</button>
        <label for="bg-color-picker">Background Color:</label>
        <input type="color" id="bg-color-picker" value="#6495ED">
        <label for="point-color-picker">Point Color:</label>
        <input type="color" id="point-color-picker" value="#000000">
    </div>
</body>
</html>
