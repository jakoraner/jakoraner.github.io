<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W07P2</title>
    <!-- Include Angel's WebGL utility scripts -->
    <script src="../angelCommon/webgl-utils.js"></script>
    <script src="../angelCommon/initShaders.js"></script>
    <script src="../angelCommon/MV.js"></script>

    <!-- Vertex Shader -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 vPosition;
        attribute vec3 vNormal;
        varying vec3 texCoord;

        uniform mat4 modelViewMatrix;
        uniform mat4 projectionMatrix;
        uniform mat4 modelMatrix;
        uniform mat4 Mtex;
        uniform int isBackground;

        void main() {
            if (isBackground == 1) {
                gl_Position = vPosition; // Positions are in clip space
                vec4 pos = Mtex * vPosition;
                texCoord = pos.xyz; 
            } else {
                gl_Position = projectionMatrix * modelViewMatrix * vPosition;
                vec3 vNormalWorld = normalize(mat3(modelMatrix) * vNormal);
                texCoord = vNormalWorld;
            }
        }
    </script>

    <!-- Fragment Shader -->
    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec3 texCoord;
        uniform samplerCube texMap;

        void main() {
            vec4 texColor = textureCube(texMap, texCoord);
            gl_FragColor = texColor;
        }
    </script>

    <!-- Include your custom script -->
    <script type="text/javascript" src="w07p2.js"></script>
</head>
<body>
    <canvas id="gl" width="512" height="512">
        Your browser doesn't support the HTML5 <code>&lt;canvas&gt;</code> element.
    </canvas>

    <!-- Controls -->
    <div>
        <button id="toggle-orbit">Stop Orbiting</button>
    </div>
</body>
</html>
