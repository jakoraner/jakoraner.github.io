<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W06P2 - Texture Wrapping and Filtering Modes</title>
    <!-- Include Angel's WebGL utility scripts -->
    <script src="../angelCommon/webgl-utils.js"></script>
    <script src="../angelCommon/initShaders.js"></script>
    <script src="../angelCommon/MV.js"></script>

    <!-- Vertex Shader -->
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 vPosition;
        attribute vec2 vTexCoord;
        varying vec2 fTexCoord;

        uniform mat4 modelViewMatrix;
        uniform mat4 projectionMatrix;

        void main() {
            gl_Position = projectionMatrix * modelViewMatrix * vPosition;
            fTexCoord = vTexCoord;
        }
    </script>

    <!-- Fragment Shader -->
    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;
        varying vec2 fTexCoord;
        uniform sampler2D texture;

        void main() {
            gl_FragColor = texture2D(texture, fTexCoord);
        }
    </script>

    <!-- Include your custom script -->
    <script type="text/javascript" src="w06p2.js"></script>
</head>
<body>
    <canvas id="gl" width="512" height="512">
        Your browser doesn't support the HTML5 <code>&lt;canvas&gt;</code> element.
    </canvas>

    <!-- Controls -->
    <div>
        <label for="wrap-mode">Texture Wrapping Mode:</label>
        <select id="wrap-mode">
            <option value="REPEAT">REPEAT</option>
            <option value="CLAMP_TO_EDGE">CLAMP_TO_EDGE</option>
        </select>

        <label for="min-filter">Minification Filter:</label>
        <select id="min-filter">
            <option value="NEAREST">NEAREST</option>
            <option value="LINEAR">LINEAR</option>
            <option value="NEAREST_MIPMAP_NEAREST">NEAREST_MIPMAP_NEAREST</option>
            <option value="LINEAR_MIPMAP_NEAREST">LINEAR_MIPMAP_NEAREST</option>
            <option value="NEAREST_MIPMAP_LINEAR">NEAREST_MIPMAP_LINEAR</option>
            <option value="LINEAR_MIPMAP_LINEAR">LINEAR_MIPMAP_LINEAR</option>
        </select>

        <label for="mag-filter">Magnification Filter:</label>
        <select id="mag-filter">
            <option value="NEAREST">NEAREST</option>
            <option value="LINEAR">LINEAR</option>
        </select>

        <button id="apply-settings">Apply Settings</button>
    </div>
</body>
</html>
