<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>W09P3 - Shadow Mapping</title>
    <!-- Include Angel's WebGL utility scripts -->
    <script src="../angelCommon/webgl-utils.js"></script>
    <script src="../angelCommon/initShaders.js"></script>
    <script src="../angelCommon/MV.js"></script>
    <!-- Include the OBJ parser -->
    <script src="../OBJParser.js"></script>

    <!-- Ground Vertex Shader -->
    <script id="vertex-shader-ground" type="x-shader/x-vertex">
        attribute vec4 a_Position;
        attribute vec2 a_TexCoord;
        varying vec2 v_TexCoord;

        uniform mat4 u_MvpMatrixFromLight; // Matrix from light's point of view
        varying vec4 v_PositionFromLight;

        uniform mat4 u_ModelMatrix;
        uniform mat4 u_ViewMatrix;
        uniform mat4 u_ProjectionMatrix;

        void main() {
            gl_Position = u_ProjectionMatrix * u_ViewMatrix * u_ModelMatrix * a_Position;
            v_TexCoord = a_TexCoord;
            v_PositionFromLight = u_MvpMatrixFromLight * a_Position;
        }
    </script>

    <!-- Ground Fragment Shader -->
    <script id="fragment-shader-ground" type="x-shader/x-fragment">
        precision mediump float;
        varying vec2 v_TexCoord;
        varying vec4 v_PositionFromLight;
        
        uniform sampler2D u_Sampler;
        uniform sampler2D u_ShadowMap;
        
        void main() {
            // Calculate shadow coordinate
            vec3 shadowCoord = v_PositionFromLight.xyz / v_PositionFromLight.w;
            shadowCoord = shadowCoord * 0.5 + 0.5;
        
            float visibility = 1.0;
        
            // Check if shadowCoord is within [0, 1]
            if (shadowCoord.x >= 0.0 && shadowCoord.x <= 1.0 &&
                shadowCoord.y >= 0.0 && shadowCoord.y <= 1.0) {
        
                // Get depth from shadow map
                float depthFromShadowMap = texture2D(u_ShadowMap, shadowCoord.xy).r;
        
                // Get current fragment's depth
                float depth = shadowCoord.z;
        
                // Determine visibility
                if (depth > depthFromShadowMap + 0.005) {
                    visibility = 0.5;
                }
            }
        
            vec4 color = texture2D(u_Sampler, v_TexCoord);
            gl_FragColor = vec4(color.rgb * visibility, color.a);
        }
    </script>

    <!-- Vertex Shader for Teapot -->
    <script id="vertex-shader-teapot" type="x-shader/x-vertex">
        attribute vec4 a_Position;
        attribute vec4 a_Normal;
        attribute vec4 a_Color;

        uniform mat4 u_ModelMatrix;
        uniform mat4 u_ViewMatrix;
        uniform mat4 u_ProjectionMatrix;
        uniform mat4 u_NormalMatrix;

        uniform mat4 u_MvpMatrixFromLight; // Matrix from light's point of view
        varying vec4 v_PositionFromLight;

        varying vec3 v_Normal;
        varying vec3 v_Position;
        varying vec4 v_Color;

        void main() {
            gl_Position = u_ProjectionMatrix * u_ViewMatrix * u_ModelMatrix * a_Position;
            v_Position = vec3(u_ModelMatrix * a_Position);
            v_Normal = normalize(vec3(u_NormalMatrix * a_Normal));
            v_Color = a_Color;
            v_PositionFromLight = u_MvpMatrixFromLight * a_Position;
        }
    </script>

    <!-- Fragment Shader for Teapot -->
    <script id="fragment-shader-teapot" type="x-shader/x-fragment">
        precision mediump float;

        varying vec3 v_Normal;
        varying vec3 v_Position;
        varying vec4 v_Color;
        varying vec4 v_PositionFromLight;
        
        uniform vec3 u_LightPosition;
        uniform vec3 u_LightColor;
        uniform vec3 u_AmbientLight;
        
        uniform sampler2D u_ShadowMap;
        
        uniform vec3 u_SpecularColor; // Specular color of the material
        uniform float u_Shininess;    // Shininess coefficient
        
        void main() {
            // Normalize the normal vector
            vec3 normal = normalize(v_Normal);
        
            // Compute the light direction vector
            vec3 lightDirection = normalize(u_LightPosition - v_Position);
        
            // Compute the view direction vector (assuming the camera is at the origin)
            vec3 viewDirection = normalize(-v_Position);
        
            // Compute the reflection direction vector
            vec3 reflectionDirection = reflect(-lightDirection, normal);
        
            // Compute ambient reflection
            vec3 ambient = u_AmbientLight * v_Color.rgb;
        
            // Compute diffuse reflection
            float diff = max(dot(normal, lightDirection), 0.0);
            vec3 diffuse = u_LightColor * diff * v_Color.rgb;
        
            // Compute specular reflection
            float spec = 0.0;
            if(diff > 0.0)
                spec = pow(max(dot(reflectionDirection, viewDirection), 0.0), u_Shininess);
            vec3 specular = u_LightColor * spec * u_SpecularColor;
        
            // Shadow calculation
            vec3 shadowCoord = v_PositionFromLight.xyz / v_PositionFromLight.w;
            shadowCoord = shadowCoord * 0.5 + 0.5;
        
            float visibility = 1.0;
        
            // Check if shadowCoord is within [0, 1]
            if (shadowCoord.x >= 0.0 && shadowCoord.x <= 1.0 &&
                shadowCoord.y >= 0.0 && shadowCoord.y <= 1.0) {
        
                float depthFromShadowMap = texture2D(u_ShadowMap, shadowCoord.xy).r;
                float depth = shadowCoord.z;
        
                if (depth > depthFromShadowMap + 0.005) {
                    visibility = 0.5;
                }
            }
        
            // Sum all components
            vec3 finalColor = (ambient + diffuse + specular) * visibility;
        
            gl_FragColor = vec4(finalColor, v_Color.a);
        }
    </script>

    <script id="vertex-shader-shadow-map" type="x-shader/x-vertex">
        attribute vec4 a_Position;
    
        uniform mat4 u_ModelMatrix;
        uniform mat4 u_ViewMatrix;
        uniform mat4 u_ProjectionMatrix;
    
        varying vec4 v_PositionFromLight;
    
        void main() {
            gl_Position = u_ProjectionMatrix * u_ViewMatrix * u_ModelMatrix * a_Position;
            v_PositionFromLight = gl_Position;
        }
    </script>

    <script id="fragment-shader-shadow-map" type="x-shader/x-fragment">
        precision mediump float;
    
        varying vec4 v_PositionFromLight;
    
        void main() {
            // Encode the depth value into RGBA
            float depth = (v_PositionFromLight.z / v_PositionFromLight.w) * 0.5 + 0.5;
            gl_FragColor = vec4(depth, depth, depth, 1.0);
        }
    </script>

    <!-- Include your custom script -->
    <script type="text/javascript" src="w09p3.js"></script>
</head>
<body>
    <canvas id="gl" width="512" height="512">
        Your browser doesn't support the HTML5 <code>&lt;canvas&gt;</code> element.
    </canvas>
    <br>
    <button id="toggle-light">Toggle Light Circulation</button>
    <button id="toggle-motion">Stop Teapot Motion</button>
</body>
</html>
